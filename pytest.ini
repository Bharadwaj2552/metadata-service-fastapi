[pytest]
# Pytest configuration

# Test paths
testpaths = tests

# Python files
python_files = test_*.py
python_classes = Test*
python_functions = test_*

# Output options
addopts = 
    -v
    --strict-markers
    --tb=short
    --disable-warnings

# Markers
markers =
    unit: Unit tests
    integration: Integration tests
    slow: Slow running tests

# Coverage options
[coverage:run]
source = app
omit = 
    */venv/*
    */site-packages/*
    */tests/*

[coverage:report]
precision = 2
show_missing = True
skip_covered = False
